<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>러너로지스 스케줄</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#f0f4f9;--surface:#fff;--surface2:#e8eef6;--border:#d0dae8;
  --accent:#F97316;--acc-soft:rgba(249,115,22,.09);
  --green:#16a34a;--gs:rgba(22,163,74,.1);
  --red:#dc2626;--rs:rgba(220,38,38,.1);
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --shadow:0 1px 4px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:"Noto Sans KR",sans-serif;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--shadow);padding:0 20px;position:sticky;top:0;z-index:100}
.topbar-inner{display:flex;align-items:center;gap:12px;height:56px}
.logo{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#F97316,#ea580c);display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 0 10px rgba(249,115,22,.3);flex-shrink:0}
.topbar-inner h1{font-size:16px;font-weight:800}
.topbar-inner .sub{font-size:11px;color:var(--text3)}
.today-chip{margin-left:auto;background:var(--acc-soft);border:1px solid rgba(249,115,22,.25);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--accent);font-family:"JetBrains Mono",monospace;white-space:nowrap}
.main{max-width:960px;margin:0 auto;padding:24px 20px 60px}
.section-label{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.camp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:28px}
.camp-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:18px 16px 14px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow);text-decoration:none;color:inherit;display:block}
.camp-card:hover{border-color:var(--accent);box-shadow:0 4px 18px rgba(249,115,22,.15);transform:translateY(-2px)}
.camp-card:active{transform:translateY(0)}
.camp-icon{width:40px;height:40px;border-radius:10px;background:var(--acc-soft);border:1px solid rgba(249,115,22,.2);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.camp-name{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.camp-stat{font-size:10px;color:var(--text3);font-family:"JetBrains Mono",monospace;min-height:14px}
.camp-today{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.ct-wk{background:var(--gs);color:var(--green);border:1px solid rgba(22,163,74,.22);border-radius:20px;padding:2px 7px;font-size:9px;font-weight:600}
.ct-of{background:var(--rs);color:var(--red);border:1px solid rgba(220,38,38,.18);border-radius:20px;padding:2px 7px;font-size:9px;font-weight:600}
.divider{height:1px;background:var(--border);margin:4px 0 18px}
.special-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.special-card{background:var(--surface);border:1.5px dashed var(--border);border-radius:14px;padding:18px 16px 14px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow);text-decoration:none;color:inherit;display:block}
.special-card:hover{border-color:var(--accent);border-style:solid;box-shadow:0 4px 18px rgba(249,115,22,.12);transform:translateY(-2px)}
.special-card .camp-icon{background:var(--surface2);border-color:var(--border)}
.loading-state{text-align:center;padding:60px 20px;color:var(--text2)}
.loading-state .spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){
  .camp-grid,.special-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="logo">📦</div>
    <h1>러너로지스</h1>
    <span class="sub">스케줄 관리</span>
    <span class="today-chip" id="today-chip">—</span>
  </div>
</div>

<div class="main">
  <div class="section-label">📦 캠프 목록</div>
  <div id="camp-grid" class="camp-grid">
    <div class="loading-state" style="grid-column:1/-1">
      <div class="spin"></div>데이터 불러오는 중…
    </div>
  </div>

  <div class="divider"></div>
  <div class="section-label">⚙️ 관리</div>
  <div class="special-grid">
    <a class="special-card" href="backup.html">
      <div class="camp-icon">🗄️</div>
      <div class="camp-name">백업</div>
      <div class="camp-stat">전체 데이터</div>
    </a>
    <a class="special-card" href="manager.html">
      <div class="camp-icon">👤</div>
      <div class="camp-name">운영자</div>
      <div class="camp-stat">관리자 뷰</div>
    </a>
  </div>
</div>

<script>
var API_URL = "https://script.google.com/macros/s/AKfycbxDnJCXQOrpZyXbQwjG4kYqpxPRal7t1JaYrLBO71p77YIrBNLUnhEEym_V0Nz0xhJZ/exec";

// 캠프명(한글) → 영문 파일명 매핑
var CAMP_MAP = [
  {kr:"강서1캠프", en:"gangseo1"},
  {kr:"서초1캠프", en:"seocho1"},
  {kr:"수원1캠프", en:"suwon1"},
  {kr:"시흥1캠프", en:"siheung1"},
  {kr:"시흥2캠프", en:"siheung2"},
  {kr:"안양1캠프", en:"anyang1"},
  {kr:"인천7캠프", en:"incheon7"},
  {kr:"인천8캠프", en:"incheon8"},
  {kr:"일산5캠프", en:"ilsan5"},
];

var KD=["일","월","화","수","목","금","토"];
function toDS(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
var now=new Date();now.setDate(now.getDate()+1);
var TODAY=toDS(now);
document.getElementById("today-chip").textContent="PDD "+TODAY+" ("+KD[now.getDay()]+")";

function isWork(v){
  if(!v||v==="")return false;
  return !(v==="휴무"||v==="고정휴무"||v==="계획된 휴무"||v.indexOf("휴가")>-1||v.indexOf("병가")>-1||v.indexOf("퇴사")>-1||v.indexOf("용차")>-1||v.indexOf("미입차")>-1);
}

function renderSkeleton(){
  var html="";
  CAMP_MAP.forEach(function(c){
    html+='<a class="camp-card" href="'+c.en+'.html">'
      +'<div class="camp-icon">📦</div>'
      +'<div class="camp-name">'+c.kr+'</div>'
      +'<div class="camp-stat" id="stat-'+c.en+'">집계 중…</div>'
      +'<div class="camp-today" id="today-'+c.en+'"></div>'
      +'</a>';
  });
  document.getElementById("camp-grid").innerHTML=html;
}

function loadStats(){
  var xhr=new XMLHttpRequest();
  xhr.open("GET",API_URL+"?nocache=1&_t="+Date.now(),true);xhr.timeout=30000;
  xhr.onload=function(){
    if(xhr.status>=200&&xhr.status<300){
      try{
        var data=JSON.parse(xhr.responseText);
        if(data.error)throw new Error(data.error);
        var drivers=data.drivers||[];

        // 캠프별 집계
        var campMap={};
        CAMP_MAP.forEach(function(c){campMap[c.kr]={en:c.en,total:0,wk:0,of:0};});
        drivers.forEach(function(d){
          if(!d.camp||!d.name)return;
          if(!campMap[d.camp])return;
          campMap[d.camp].total++;
          if(isWork((d.schedule&&d.schedule[TODAY])||""))campMap[d.camp].wk++;
          else campMap[d.camp].of++;
        });

        CAMP_MAP.forEach(function(c){
          var info=campMap[c.kr];
          var statEl=document.getElementById("stat-"+c.en);
          var todEl=document.getElementById("today-"+c.en);
          if(statEl)statEl.textContent="총 "+info.total+"명";
          if(todEl)todEl.innerHTML='<span class="ct-wk">출근 '+info.wk+'</span><span class="ct-of">휴무 '+info.of+'</span>';
        });
      }catch(e){
        CAMP_MAP.forEach(function(c){
          var el=document.getElementById("stat-"+c.en);
          if(el)el.textContent="오류";
        });
      }
    }
  };
  xhr.onerror=xhr.ontimeout=function(){
    CAMP_MAP.forEach(function(c){
      var el=document.getElementById("stat-"+c.en);
      if(el)el.textContent="연결 오류";
    });
  };
  xhr.send();
}

renderSkeleton();
loadStats();
</script>
</body>
</html>
